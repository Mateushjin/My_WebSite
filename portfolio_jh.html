<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JinHong — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--surface:#161616;--card:#1c1c1c;--border:#2a2a2a;
  --text:#e8e4dc;--muted:#8a8680;--accent:#c8a96e;
  --serif:'Playfair Display',Georgia,serif;--sans:'Source Sans 3',sans-serif;
}
[data-theme="light"]{
  --bg:#f7f5f2;--surface:#fff;--card:#fff;--border:#e4e0da;
  --text:#1a1916;--muted:#7a7670;--accent:#8a6a2e;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;transition:background 0.3s,color 0.3s}
nav{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2.5rem;border-bottom:1px solid var(--border)}
.logo{font-family:var(--serif);font-size:1.4rem;letter-spacing:0.02em;color:var(--text)}
.logo span{color:var(--accent)}
.theme-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:0.25rem 0.6rem;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;border-radius:2px;font-family:var(--sans);transition:all 0.2s}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.hero{padding:5rem 2.5rem 4rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:1rem;max-width:720px}
.hero-name{font-family:var(--serif);font-size:clamp(3.5rem,10vw,6rem);font-weight:700;letter-spacing:-0.04em;line-height:1;color:var(--text)}
.hero-name em{font-style:italic;font-weight:400;color:var(--muted)}
.hero-title{font-size:13px;text-transform:uppercase;letter-spacing:0.14em;color:var(--accent);margin-top:0.5rem}
.hero-socials{display:flex;gap:1rem;margin-top:1.5rem}
.social-link{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--border);border-radius:2px;color:var(--muted);text-decoration:none;transition:all 0.2s}
.social-link:hover{border-color:var(--accent);color:var(--accent)}
.social-link svg{width:16px;height:16px;fill:currentColor}
.section-head{display:flex;align-items:center;gap:1rem;padding:1.25rem 2.5rem;border-bottom:1px solid var(--border)}
.sec-accent{width:20px;height:2px;background:var(--accent);flex-shrink:0}
.sec-title{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted)}
.sec-line{flex:1;height:1px;background:var(--border)}
.projects{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}
.proj-card{padding:2rem;border-right:1px solid var(--border);cursor:pointer;transition:background 0.2s;display:flex;flex-direction:column;gap:0.75rem}
.proj-card:last-child{border-right:none}
.proj-card:hover{background:var(--surface)}
.proj-card:hover .proj-title{color:var(--accent)}
.proj-img{aspect-ratio:16/9;border-radius:4px;margin-bottom:0.5rem;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted)}
.proj-img.meridiano{background:linear-gradient(135deg,#0d1a12 0%,#1a2e1e 100%)}
.proj-img.empty{background:var(--card);border:1px dashed var(--border)}
.proj-tag{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent)}
.proj-title{font-family:var(--serif);font-size:1.1rem;color:var(--text);transition:color 0.2s;line-height:1.3}
.proj-desc{font-size:13px;color:var(--muted);line-height:1.6}
.proj-arrow{font-size:12px;color:var(--accent);margin-top:auto}
.proj-empty-label{font-size:12px;color:var(--border);text-transform:uppercase;letter-spacing:0.1em}
footer{padding:1.5rem 2.5rem;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted)}
@media(max-width:640px){
  .projects{grid-template-columns:1fr}
  .proj-card{border-right:none;border-bottom:1px solid var(--border)}
}
</style>
</head>
<body>
<nav>
  <div class="logo">J<span>H</span></div>
  <button class="theme-btn" onclick="toggleTheme()">☀ Claro</button>
</nav>
<div class="hero">
  <h1 class="hero-name">Mateus</h1>
  <div class="hero-title"><!-- SEU TÍTULO PROFISSIONAL --></div>

    </a>
  </div>
</div>
<div class="section-head">
  <div class="sec-accent"></div>
  <span class="sec-title">Projetos</span>
  <div class="sec-line"></div>
</div>
<div class="projects">
  <div class="proj-card">
    <div class="proj-img meridiano"></div>
    <div class="proj-tag">Newsletter · Blog · IA</div>
    <div class="proj-title">Meridiano</div>
    <div class="proj-desc">Blog de análise sobre geopolítica, economia política e tecnologia com newsletter diária gerada por IA.</div>
    <div class="proj-arrow">Ver projeto →</div>
  </div>
  <div class="proj-card">
    <div class="proj-img empty"><span class="proj-empty-label">Em breve</span></div>
    <div class="proj-tag"></div>
    <div class="proj-title" style="color:var(--border)">Projeto 2</div>
    <div class="proj-desc" style="color:var(--border)">Em construção</div>
  </div>
  <div class="proj-card">
    <div class="proj-img empty"><span class="proj-empty-label">Em breve</span></div>
    <div class="proj-tag"></div>
    <div class="proj-title" style="color:var(--border)">Projeto 3</div>
    <div class="proj-desc" style="color:var(--border)">Em construção</div>
  </div>
</div>
<footer>
  <span>© 2026 JH</span>
  <span>Análise independente</span>
</footer>
<script>
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.querySelector('.theme-btn').textContent=isDark?'☾ Escuro':'☀ Claro';
}
</script>
</body>
</html>
